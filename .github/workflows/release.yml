name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Validate release version
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag '$tag' must use vX.Y.Z format."
          }

          $version = $tag.Substring(1)
          [xml]$project = Get-Content -Raw -Encoding UTF8 -LiteralPath "EasyGet.csproj"
          $projectVersion = $project.Project.PropertyGroup |
            ForEach-Object { $_.Version } |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
            Select-Object -First 1
          if ($projectVersion -ne $version) {
            throw "Version mismatch: tag '$tag' but EasyGet.csproj <Version> is '$projectVersion'."
          }

      - name: Restore
        run: |
          dotnet restore EasyGet.csproj
          dotnet restore EasyGet.Tests/EasyGet.Tests.csproj

      - name: Test
        run: dotnet test EasyGet.Tests/EasyGet.Tests.csproj -c Release --no-restore

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer and portable zip
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          ./scripts/build-installer.ps1 -Configuration Release -Runtime win-x64 -Version $version -SkipTests

      - name: Verify update manifest
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          $releaseDir = "artifacts/publish/Release"
          $setup = Get-Item "$releaseDir/EasyGet-Setup-v$version.exe"
          $zip = Get-Item "$releaseDir/EasyGet-win-x64-Release.zip"
          $manifestPath = "$releaseDir/easyget-update.json"
          if (-not (Test-Path -LiteralPath $manifestPath)) {
            throw "Missing update manifest: $manifestPath"
          }

          $manifest = Get-Content -Raw -Encoding UTF8 -LiteralPath $manifestPath | ConvertFrom-Json
          if ($manifest.version -ne $version) {
            throw "Manifest version mismatch: expected '$version' but got '$($manifest.version)'."
          }
          if ($manifest.tag -ne "${env:GITHUB_REF_NAME}") {
            throw "Manifest tag mismatch: expected '${env:GITHUB_REF_NAME}' but got '$($manifest.tag)'."
          }
          if ($manifest.setupAsset -ne $setup.Name -or [long]$manifest.setupSize -ne $setup.Length) {
            throw "Manifest setup asset does not match generated installer."
          }
          if ($manifest.zipAsset -ne $zip.Name -or [long]$manifest.zipSize -ne $zip.Length) {
            throw "Manifest zip asset does not match generated portable zip."
          }

      - name: Prepare release notes
        shell: bash
        run: |
          git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "EasyGet ${GITHUB_REF_NAME}" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            artifacts/publish/Release/EasyGet-Setup-${{ github.ref_name }}.exe
            artifacts/publish/Release/EasyGet-win-x64-Release.zip
            artifacts/publish/Release/easyget-update.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
